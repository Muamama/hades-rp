<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>排班管理 | 冥界</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #080606;
      --panel: rgba(25, 18, 18, 0.88);
      --panel-2: rgba(18, 12, 12, 0.88);
      --gold: #d8b36a;
      --gold-soft: rgba(216, 179, 106, 0.38);
      --gold-deep: #8b6a2f;
      --text: #f8f1df;
      --muted: #c6b89b;
      --danger: #7e2727;
      --danger-hover: #a33636;
      --ok: #876228;
      --ok-hover: #a77a32;
      --line: rgba(216, 179, 106, 0.18);
      --input-bg: rgba(255, 255, 255, 0.04);
      --shadow: 0 0 30px rgba(216, 179, 106, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, rgba(216,179,106,0.08), transparent 30%),
        linear-gradient(180deg, #090606 0%, #120b0b 100%);
      color: var(--text);
      font-family: "Noto Serif TC", serif;
      min-height: 100%;
    }

    body {
      padding: 32px 18px 60px;
    }

    .admin-wrap {
      width: min(1280px, 100%);
      margin: 0 auto;
    }

    .admin-header {
      margin-bottom: 28px;
      text-align: center;
    }

    .admin-header h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--gold);
      text-shadow: 0 0 18px rgba(216, 179, 106, 0.2);
    }

    .admin-header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      letter-spacing: 0.06em;
    }

    .admin-panel {
      background: var(--panel);
      border: 1px solid var(--gold-soft);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      margin-bottom: 24px;
    }

    .admin-panel h2 {
      margin: 0 0 18px;
      color: var(--gold);
      font-size: 1.3rem;
      letter-spacing: 0.08em;
    }

    .create-grid,
    .row-grid {
      display: grid;
      grid-template-columns: 1.4fr 1.05fr 0.95fr 1.7fr 0.7fr auto auto;
      gap: 12px;
      align-items: center;
    }

    .row-grid {
      padding: 14px 0;
      border-top: 1px solid var(--line);
    }

    .row-grid:first-child {
      border-top: none;
      padding-top: 0;
    }

    .list-head {
      display: grid;
      grid-template-columns: 1.4fr 1.05fr 0.95fr 1.7fr 0.7fr auto auto;
      gap: 12px;
      align-items: center;
      color: var(--gold);
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      padding-bottom: 14px;
      margin-bottom: 2px;
      border-bottom: 1px solid var(--line);
    }

    input,
    select,
    button {
      width: 100%;
      border: 1px solid var(--gold-soft);
      background: var(--input-bg);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.95rem;
      font-family: "Noto Serif TC", serif;
      outline: none;
      transition: 0.25s ease;
    }

    input:focus,
    select:focus {
      border-color: rgba(216, 179, 106, 0.8);
      box-shadow: 0 0 0 3px rgba(216, 179, 106, 0.08);
    }

    button {
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .btn-add,
    .btn-save,
    .btn-refresh,
    .btn-login {
      background: linear-gradient(180deg, var(--ok) 0%, #6f4f1d 100%);
      color: #fff5df;
    }

    .btn-add:hover,
    .btn-save:hover,
    .btn-refresh:hover,
    .btn-login:hover {
      background: linear-gradient(180deg, var(--ok-hover) 0%, #805b20 100%);
      box-shadow: 0 0 18px rgba(216, 179, 106, 0.18);
    }

    .btn-delete,
    .btn-logout {
      background: linear-gradient(180deg, var(--danger) 0%, #5f1d1d 100%);
      color: #fff0f0;
    }

    .btn-delete:hover,
    .btn-logout:hover {
      background: linear-gradient(180deg, var(--danger-hover) 0%, #7d2222 100%);
      box-shadow: 0 0 18px rgba(163, 54, 54, 0.18);
    }

    .top-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .top-actions button {
      width: auto;
      min-width: 132px;
    }

    .status-text {
      margin-top: 16px;
      min-height: 24px;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.04em;
    }

    .empty-box {
      padding: 22px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--gold-soft);
      border-radius: 16px;
      background: rgba(255,255,255,0.02);
    }

    .admin-foot-note {
      margin-top: 18px;
      color: #b7a98d;
      font-size: 0.9rem;
      line-height: 1.8;
    }

    .locked-note {
      margin-top: 10px;
      color: #d8c89c;
      font-size: 0.92rem;
      line-height: 1.8;
    }

    @media (max-width: 1120px) {
      .create-grid,
      .row-grid,
      .list-head {
        grid-template-columns: 1fr;
      }

      .list-head {
        display: none;
      }

      .row-grid {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
        margin-bottom: 14px;
        background: var(--panel-2);
      }

      .row-grid:first-child {
        padding-top: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="admin-wrap">

    <div class="admin-header">
      <h1>排班管理</h1>
      <p>今夜名冊 / Schedule Admin</p>
    </div>

    <section class="admin-panel">
      <div class="top-actions">
        <button type="button" class="btn-login" onclick="loginAdmin()">登入</button>
        <button type="button" class="btn-refresh" onclick="loadSchedule()">重新讀取</button>
        <button type="button" class="btn-logout" onclick="logoutAdmin()">登出</button>
      </div>

      <h2>新增排班</h2>

      <div class="create-grid">
        <input type="text" id="newName" placeholder="店員名稱">
        <input type="date" id="newDate">
        <select id="newStatus">
          <option value="wait">空閒</option>
          <option value="off">請假</option>
        </select>
        <input type="text" id="newImg" placeholder="圖片路徑，例如 images/host-01.png">
        <input type="number" id="newSort" placeholder="排序">
        <button type="button" class="btn-add" onclick="addSchedule()">新增</button>
        <div></div>
      </div>

      <div class="status-text" id="createStatus"></div>
    </section>

    <section class="admin-panel">
      <h2>現有排班</h2>

      <div class="list-head">
        <div>店員</div>
        <div>日期</div>
        <div>狀態</div>
        <div>圖片路徑</div>
        <div>排序</div>
        <div>儲存</div>
        <div>刪除</div>
      </div>

      <div id="scheduleList"></div>

      <div class="admin-foot-note">
        狀態只建議使用兩種人工設定值：wait / off。<br>
        只要該時段有有效預約，系統會自動同步成 busy。
      </div>

      <div class="locked-note">
        如果某筆排班目前已有預約，後台編輯時狀態欄仍會顯示 busy，但那代表它被預約中，不建議手動改成其他狀態。<br>
        要釋放時段，請到 admin-bookings.html 取消或完成那筆預約。
      </div>
    </section>

  </div>

  <script>
    const SUPABASE_URL = "https://jzhbqavasikwpxbqjksu.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_KFcwagT3Ho1ivjPv3Oq9zw_FNIaBVpX";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const scheduleList = document.getElementById("scheduleList");
    const createStatus = document.getElementById("createStatus");

    let scheduleChannel = null;
    let bookingsChannel = null;

    function setCreateStatus(text, isError = false) {
      createStatus.textContent = text;
      createStatus.style.color = isError ? "#f0b2b2" : "#cbb78a";
    }

    function escapeHtml(str) {
      if (str === null || str === undefined) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function rowTemplate(item) {
      const isBusy = item.final_status === "busy";

      return `
        <div class="row-grid" data-id="${item.id}">
          <input type="text" class="edit-name" value="${escapeHtml(item.name || "")}" placeholder="店員名稱">
          <input type="date" class="edit-date" value="${escapeHtml(item.date || "")}">
          <select class="edit-status">
            <option value="wait" ${item.final_status === "wait" ? "selected" : ""}>空閒</option>
            <option value="busy" ${item.final_status === "busy" ? "selected" : ""}>已預定</option>
            <option value="off" ${item.final_status === "off" ? "selected" : ""}>請假</option>
          </select>
          <input type="text" class="edit-img" value="${escapeHtml(item.img || "")}" placeholder="圖片路徑">
          <input type="number" class="edit-sort" value="${item.sort_order ?? 0}" placeholder="排序">
          <button type="button" class="btn-save" onclick="updateSchedule(${item.id}, this)">儲存</button>
          <button type="button" class="btn-delete" onclick="deleteSchedule(${item.id})">刪除</button>
        </div>
      `;
    }

    async function ensureSession() {
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) {
        console.error(error);
        return false;
      }
      return !!data.session;
    }

    async function getMergedScheduleData() {
      const [
        { data: scheduleData, error: scheduleError },
        { data: reservationData, error: reservationError }
      ] = await Promise.all([
        supabaseClient
          .from("schedule_list")
          .select("*")
          .order("sort_order", { ascending: true })
          .order("id", { ascending: true }),
        supabaseClient
          .from("reservations_public_view")
          .select("schedule_id, status")
      ]);

      if (scheduleError) {
        throw scheduleError;
      }

      if (reservationError) {
        throw reservationError;
      }

      const reservedMap = new Set(
        (reservationData || [])
          .filter(item => item.status === "pending" || item.status === "confirmed")
          .map(item => Number(item.schedule_id))
      );

      return (scheduleData || []).map(item => {
        let finalStatus = item.status || "off";
        if (item.status !== "off" && reservedMap.has(Number(item.id))) {
          finalStatus = "busy";
        }
        return {
          ...item,
          final_status: finalStatus
        };
      });
    }

    async function loadSchedule() {
      scheduleList.innerHTML = `<div class="empty-box">讀取中...</div>`;

      const hasSession = await ensureSession();
      if (!hasSession) {
        scheduleList.innerHTML = `<div class="empty-box">請先以管理員帳號登入。</div>`;
        setCreateStatus("尚未登入。", true);
        return;
      }

      try {
        const data = await getMergedScheduleData();

        if (!data || data.length === 0) {
          scheduleList.innerHTML = `<div class="empty-box">目前沒有排班資料。</div>`;
          setCreateStatus("目前沒有排班資料。");
          return;
        }

        scheduleList.innerHTML = data.map(rowTemplate).join("");
        setCreateStatus("已讀取最新排班資料。");
      } catch (error) {
        console.error("讀取排班失敗：", error);
        scheduleList.innerHTML = `<div class="empty-box">讀取失敗，請檢查 Supabase 設定或 admin_users 權限。</div>`;
        setCreateStatus("讀取失敗。", true);
      }
    }

    async function addSchedule() {
      const hasSession = await ensureSession();
      if (!hasSession) {
        setCreateStatus("請先登入管理員帳號。", true);
        return;
      }

      const name = document.getElementById("newName").value.trim();
      const date = document.getElementById("newDate").value;
      const status = document.getElementById("newStatus").value;
      const img = document.getElementById("newImg").value.trim();
      const sort_order = Number(document.getElementById("newSort").value || 0);

      if (!name) {
        setCreateStatus("請填寫店員名稱。", true);
        return;
      }

      if (!date) {
        setCreateStatus("請填寫日期。", true);
        return;
      }

      if (!["wait", "off"].includes(status)) {
        setCreateStatus("新增排班只允許 wait 或 off。", true);
        return;
      }

      const { error } = await supabaseClient
        .from("schedule_list")
        .insert([
          {
            name,
            date,
            status,
            img,
            sort_order
          }
        ]);

      if (error) {
        console.error("新增排班失敗：", error);
        setCreateStatus("新增失敗，請檢查 RLS 或欄位設定。", true);
        return;
      }

      document.getElementById("newName").value = "";
      document.getElementById("newDate").value = "";
      document.getElementById("newStatus").value = "wait";
      document.getElementById("newImg").value = "";
      document.getElementById("newSort").value = "";

      setCreateStatus("新增成功。");
      loadSchedule();
    }

    async function updateSchedule(id, btn) {
      const hasSession = await ensureSession();
      if (!hasSession) {
        alert("請先登入管理員帳號");
        return;
      }

      const row = btn.closest(".row-grid");
      const name = row.querySelector(".edit-name").value.trim();
      const date = row.querySelector(".edit-date").value;
      const status = row.querySelector(".edit-status").value;
      const img = row.querySelector(".edit-img").value.trim();
      const sort_order = Number(row.querySelector(".edit-sort").value || 0);

      if (!name) {
        alert("店員名稱不能空白");
        return;
      }

      if (!date) {
        alert("日期不能空白");
        return;
      }

      const currentRows = await getMergedScheduleData();
      const currentItem = currentRows.find(item => Number(item.id) === Number(id));

      if (!currentItem) {
        alert("找不到該筆資料");
        return;
      }

      if (currentItem.final_status === "busy" && status !== "busy") {
        const ok = confirm("這個時段目前有有效預約。若你改動狀態，實際顯示仍可能被預約同步回 busy。建議先到預約後台取消/完成預約。要繼續嗎？");
        if (!ok) return;
      }

      const { error } = await supabaseClient
        .from("schedule_list")
        .update({
          name,
          date,
          status,
          img,
          sort_order
        })
        .eq("id", id);

      if (error) {
        console.error("更新失敗：", error);
        alert("更新失敗，請檢查權限或資料表設定。");
        return;
      }

      alert("已更新");
      loadSchedule();
    }

    async function deleteSchedule(id) {
      const hasSession = await ensureSession();
      if (!hasSession) {
        alert("請先登入管理員帳號");
        return;
      }

      const ok = confirm("確定要刪除這筆排班嗎？刪除後，對應的預約也會一起刪除。");
      if (!ok) return;

      const { error } = await supabaseClient
        .from("schedule_list")
        .delete()
        .eq("id", id);

      if (error) {
        console.error("刪除失敗：", error);
        alert("刪除失敗，請檢查權限設定。");
        return;
      }

      loadSchedule();
    }

    async function loginAdmin() {
      const email = prompt("請輸入管理員 Email");
      if (!email) return;

      const password = prompt("請輸入密碼");
      if (!password) return;

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        console.error("登入失敗：", error);
        setCreateStatus("登入失敗：" + error.message, true);
        return;
      }

      setCreateStatus("登入成功。");
      await loadSchedule();
      setupRealtime();
    }

    async function logoutAdmin() {
      const { error } = await supabaseClient.auth.signOut();
      if (error) {
        console.error("登出失敗：", error);
        setCreateStatus("登出失敗。", true);
        return;
      }

      if (scheduleChannel) {
        supabaseClient.removeChannel(scheduleChannel);
        scheduleChannel = null;
      }
      if (bookingsChannel) {
        supabaseClient.removeChannel(bookingsChannel);
        bookingsChannel = null;
      }

      scheduleList.innerHTML = `<div class="empty-box">你已登出。</div>`;
      setCreateStatus("已登出。");
    }

    function setupRealtime() {
      if (scheduleChannel) {
        supabaseClient.removeChannel(scheduleChannel);
      }
      if (bookingsChannel) {
        supabaseClient.removeChannel(bookingsChannel);
      }

      scheduleChannel = supabaseClient
        .channel("admin_schedule_list_realtime")
        .on(
          "postgres_changes",
          {
            event: "*",
            schema: "public",
            table: "schedule_list"
          },
          async () => {
            await loadSchedule();
          }
        )
        .subscribe((status) => {
          console.log("admin schedule realtime:", status);
        });

      bookingsChannel = supabaseClient
        .channel("admin_schedule_reservations_realtime")
        .on(
          "postgres_changes",
          {
            event: "*",
            schema: "public",
            table: "reservations"
          },
          async () => {
            await loadSchedule();
          }
        )
        .subscribe((status) => {
          console.log("admin schedule reservation realtime:", status);
        });
    }

    loadSchedule();
  </script>

</body>
</html>
