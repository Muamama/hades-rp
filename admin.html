<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | 冥界</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    .admin-board-section {
      width: min(1200px, 92%);
      margin: 0 auto 80px;
      display: grid;
      gap: 28px;
    }

    .admin-card {
      border: 1px solid rgba(212, 175, 55, 0.28);
      background: rgba(12, 12, 12, 0.84);
      border-radius: 22px;
      padding: 26px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow:
        0 0 20px rgba(212, 175, 55, 0.06),
        inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .admin-title {
      margin: 0 0 18px;
      font-size: 1.35rem;
      letter-spacing: 0.08em;
      color: #f1d38b;
      text-shadow: 0 0 12px rgba(212, 175, 55, 0.18);
    }

    .admin-subtitle {
      margin: -6px 0 18px;
      color: rgba(255,255,255,0.72);
      font-size: 0.95rem;
      line-height: 1.8;
    }

    .admin-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px 18px;
    }

    .admin-form-grid.schedule-create {
      grid-template-columns: 1.1fr 1fr 1fr 1.4fr 0.8fr;
    }

    .admin-label {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .admin-label span {
      color: #f2e6c7;
      font-size: 0.94rem;
      letter-spacing: 0.04em;
    }

    .admin-input,
    .admin-select,
    .schedule-row input,
    .schedule-row select {
      width: 100%;
      min-height: 46px;
      border-radius: 14px;
      border: 1px solid rgba(212, 175, 55, 0.22);
      background: rgba(255,255,255,0.04);
      color: #f7f1e4;
      padding: 12px 14px;
      font-size: 0.98rem;
      outline: none;
      transition: 0.25s ease;
    }

    /* admin 狀態下拉選單：黑底黃字 */
    .admin-select,
    .schedule-row select,
    select.row-status,
    select#newScheduleStatus {
      background: #0b0b0b !important;
      color: #f1d38b !important;
      border: 1px solid rgba(212, 175, 55, 0.35) !important;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
    }
    
    /* 下拉展開選項 */
    .admin-select option,
    .schedule-row select option,
    select.row-status option,
    select#newScheduleStatus option {
      background: #0b0b0b !important;
      color: #f1d38b !important;
    }
    
    /* 被選中的 option */
    .admin-select option:checked,
    .schedule-row select option:checked,
    select.row-status option:checked,
    select#newScheduleStatus option:checked {
      background: #1a1a1a !important;
      color: #ffd978 !important;
    }
      .admin-input:focus,
      .admin-select:focus,
      .schedule-row input:focus,
      .schedule-row select:focus {
        border-color: rgba(212, 175, 55, 0.62);
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.08);
      }

    .admin-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .admin-btn {
      min-width: 132px;
      min-height: 44px;
      border: 1px solid rgba(212, 175, 55, 0.34);
      border-radius: 999px;
      padding: 10px 18px;
      background:
        linear-gradient(180deg, rgba(212,175,55,0.20), rgba(212,175,55,0.08));
      color: #f8edd2;
      font-size: 0.96rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .admin-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 16px rgba(212, 175, 55, 0.16);
      border-color: rgba(212, 175, 55, 0.55);
    }

    .admin-btn.ghost {
      background: rgba(255,255,255,0.03);
    }

    .admin-btn.danger {
      border-color: rgba(185, 62, 62, 0.35);
      background: linear-gradient(180deg, rgba(185,62,62,0.18), rgba(185,62,62,0.08));
      color: #ffdede;
    }

    .admin-btn.save-btn {
      min-width: 96px;
    }

    .admin-btn.delete-btn {
      min-width: 96px;
    }

    .admin-message {
      margin: 16px 0 0;
      min-height: 24px;
      color: #d7c59a;
      line-height: 1.8;
    }

    .admin-message.error {
      color: #ffb2b2;
    }

    .admin-message.success {
      color: #bff0c8;
    }

    .admin-divider {
      height: 1px;
      margin: 26px 0;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.28), transparent);
    }

    .schedule-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .schedule-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .schedule-row {
      display: grid;
      grid-template-columns: 1.15fr 0.95fr 0.9fr 1.45fr 0.7fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(212, 175, 55, 0.16);
      background: rgba(255,255,255,0.02);
    }

    .schedule-head {
      display: grid;
      grid-template-columns: 1.15fr 0.95fr 0.9fr 1.45fr 0.7fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 0 14px 12px;
      color: #f1d38b;
      font-size: 0.92rem;
      letter-spacing: 0.06em;
      opacity: 0.92;
    }

    .admin-note {
      margin-top: 14px;
      color: rgba(255,255,255,0.62);
      line-height: 1.8;
      font-size: 0.92rem;
    }

    .inline-status {
      color: rgba(255,255,255,0.7);
      font-size: 0.92rem;
    }

    @media (max-width: 1080px) {
      .admin-form-grid,
      .admin-form-grid.schedule-create,
      .schedule-row,
      .schedule-head {
        grid-template-columns: 1fr;
      }

      .schedule-head {
        display: none;
      }
    }
  </style>
</head>
<script>
  const siteHeader = document.querySelector('.site-header');

  window.addEventListener('scroll', () => {

      siteHeader.classList.remove('scrolled');

</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const menuToggle = document.getElementById('menuToggle');
  const mobileMenu = document.getElementById('mobileMenu');
  const siteHeader = document.querySelector('.site-header');

  if (menuToggle && mobileMenu) {
    menuToggle.addEventListener('click', function (e) {
      e.stopPropagation();
      menuToggle.classList.toggle('active');
      mobileMenu.classList.toggle('open');

      const isOpen = mobileMenu.classList.contains('open');
      menuToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });

    mobileMenu.addEventListener('click', function (e) {
      e.stopPropagation();
    });

    document.addEventListener('click', function () {
      menuToggle.classList.remove('active');
      mobileMenu.classList.remove('open');
      menuToggle.setAttribute('aria-expanded', 'false');
    });
  }

  if (siteHeader) {
    window.addEventListener('scroll', function () {
      if (window.scrollY > 10) {
        siteHeader.classList.add('scrolled');
      } else {
        siteHeader.classList.remove('scrolled');
      }
    });
  }
});
</script>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://jzhbqavasikwpxbqjksu.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_KFcwagT3Ho1ivjPv3Oq9zw_FNIaBVpX";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const adminEmail = document.getElementById("adminEmail");
    const adminPassword = document.getElementById("adminPassword");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const refreshSessionBtn = document.getElementById("refreshSessionBtn");
    const authMessage = document.getElementById("authMessage");

    const hostSelect = document.getElementById("hostSelect");
    const amountInput = document.getElementById("amountInput");
    const addAmountBtn = document.getElementById("addAmountBtn");
    const adminMessage = document.getElementById("adminMessage");

    const newScheduleName = document.getElementById("newScheduleName");
    const newScheduleDate = document.getElementById("newScheduleDate");
    const newScheduleStatus = document.getElementById("newScheduleStatus");
    const newScheduleImg = document.getElementById("newScheduleImg");
    const newScheduleSort = document.getElementById("newScheduleSort");
    const addScheduleBtn = document.getElementById("addScheduleBtn");
    const reloadScheduleBtn = document.getElementById("reloadScheduleBtn");
    const scheduleList = document.getElementById("scheduleList");
    const scheduleMessage = document.getElementById("scheduleMessage");

    function setMessage(el, text, type = "") {
      el.textContent = text;
      el.classList.remove("error", "success");
      if (type) el.classList.add(type);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function checkSession(showMessage = true) {
      const { data, error } = await supabase.auth.getSession();

      if (error) {
        if (showMessage) setMessage(authMessage, "登入狀態檢查失敗。", "error");
        return null;
      }

      const user = data.session?.user ?? null;

      if (user) {
        if (showMessage) setMessage(authMessage, `已登入：${user.email}`, "success");
        return user;
      }

      if (showMessage) setMessage(authMessage, "請先登入管理員帳號。");
      return null;
    }

    async function loginAdmin() {
      const email = adminEmail.value.trim();
      const password = adminPassword.value;

      if (!email || !password) {
        setMessage(authMessage, "請輸入 Email 與密碼。", "error");
        return;
      }

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        console.error(error);
        setMessage(authMessage, "登入失敗。", "error");
        return;
      }

      setMessage(authMessage, `已登入：${data.user.email}`, "success");
      setMessage(adminMessage, "已通過管理員驗證，可以增加金額。", "success");
      setMessage(scheduleMessage, "已通過管理員驗證，可以管理時間表。", "success");

      adminPassword.value = "";
      await loadSchedule();
    }

    async function logoutAdmin() {
      const { error } = await supabase.auth.signOut();

      if (error) {
        console.error(error);
        setMessage(authMessage, "登出失敗。", "error");
        return;
      }

      setMessage(authMessage, "已登出。");
      setMessage(adminMessage, "登入後才可修改排行榜。");
      setMessage(scheduleMessage, "登入後才可修改時間表。");
    }

    async function addAmount() {
      const user = await checkSession();
      if (!user) {
        setMessage(adminMessage, "請先登入管理員帳號。", "error");
        return;
      }

      const hostName = hostSelect.value;
      const amount = Number(amountInput.value);

      if (!hostName || !amount || amount <= 0) {
        setMessage(adminMessage, "請輸入正確金額。", "error");
        return;
      }

      const { data: currentRow, error: fetchError } = await supabase
        .from("host_leaderboard")
        .select("host_name, tip_count, total_amount")
        .eq("host_name", hostName)
        .single();

      if (fetchError) {
        console.error(fetchError);
        setMessage(adminMessage, "讀取店員資料失敗。", "error");
        return;
      }

      const newTipCount = (currentRow.tip_count || 0) + 1;
      const newTotalAmount = (currentRow.total_amount || 0) + amount;

      const { error: updateError } = await supabase
        .from("host_leaderboard")
        .update({
          tip_count: newTipCount,
          total_amount: newTotalAmount,
          updated_at: new Date().toISOString()
        })
        .eq("host_name", hostName);

      if (updateError) {
        console.error(updateError);
        setMessage(adminMessage, "更新失敗，請確認是否為管理員帳號。", "error");
        return;
      }

      setMessage(adminMessage, `已為 ${hostName} 增加 ${amount.toLocaleString()} GIL。`, "success");
      amountInput.value = "";
    }

    function scheduleRowTemplate(item) {
      return `
        <div class="schedule-row" data-id="${item.id}">
          <input class="row-name" type="text" value="${escapeHtml(item.name)}" />
          <input class="row-date" type="date" value="${escapeHtml(item.date)}" />
          <select class="row-status">
            <option value="wait" ${item.status === "wait" ? "selected" : ""}>空閒</option>
            <option value="busy" ${item.status === "busy" ? "selected" : ""}>已預定</option>
            <option value="off" ${item.status === "off" ? "selected" : ""}>請假</option>
          </select>
          <input class="row-img" type="text" value="${escapeHtml(item.img)}" />
          <input class="row-sort" type="number" min="0" step="1" value="${Number(item.sort_order ?? 0)}" />
          <button class="admin-btn save-btn" type="button" data-action="save">儲存</button>
          <button class="admin-btn danger delete-btn" type="button" data-action="delete">刪除</button>
        </div>
      `;
    }

    async function loadSchedule() {
      scheduleList.innerHTML = `<div class="admin-note">讀取中...</div>`;

      const { data, error } = await supabase
        .from("schedule_list")
        .select("*")
        .order("sort_order", { ascending: true })
        .order("id", { ascending: true });

      if (error) {
        console.error(error);
        scheduleList.innerHTML = `<div class="admin-note">讀取時間表失敗。</div>`;
        return;
      }

      if (!data || data.length === 0) {
        scheduleList.innerHTML = `<div class="admin-note">目前沒有排班資料。</div>`;
        return;
      }

      scheduleList.innerHTML = data.map(scheduleRowTemplate).join("");
    }

    async function addSchedule() {
      const user = await checkSession();
      if (!user) {
        setMessage(scheduleMessage, "請先登入管理員帳號。", "error");
        return;
      }

      const payload = {
        name: newScheduleName.value.trim(),
        date: newScheduleDate.value,
        status: newScheduleStatus.value,
        img: newScheduleImg.value.trim(),
        sort_order: Number(newScheduleSort.value || 0)
      };

      if (!payload.name) {
        setMessage(scheduleMessage, "請輸入店員名稱。", "error");
        return;
      }

      if (!payload.date) {
        setMessage(scheduleMessage, "請輸入日期。", "error");
        return;
      }

      const { error } = await supabase
        .from("schedule_list")
        .insert([payload]);

      if (error) {
        console.error(error);
        setMessage(scheduleMessage, "新增排班失敗，請檢查 RLS 權限。", "error");
        return;
      }

      setMessage(scheduleMessage, `已新增 ${payload.name} 的排班。`, "success");

      newScheduleName.value = "";
      newScheduleDate.value = "";
      newScheduleStatus.value = "wait";
      newScheduleImg.value = "";
      newScheduleSort.value = "";

      await loadSchedule();
    }

    async function saveScheduleRow(rowEl) {
      const user = await checkSession(false);
      if (!user) {
        setMessage(scheduleMessage, "請先登入管理員帳號。", "error");
        return;
      }

      const id = Number(rowEl.dataset.id);
      const payload = {
        name: rowEl.querySelector(".row-name").value.trim(),
        date: rowEl.querySelector(".row-date").value,
        status: rowEl.querySelector(".row-status").value,
        img: rowEl.querySelector(".row-img").value.trim(),
        sort_order: Number(rowEl.querySelector(".row-sort").value || 0)
      };

      if (!payload.name || !payload.date) {
        setMessage(scheduleMessage, "店員名稱與日期不能空白。", "error");
        return;
      }

      const { error } = await supabase
        .from("schedule_list")
        .update(payload)
        .eq("id", id);

      if (error) {
        console.error(error);
        setMessage(scheduleMessage, `更新 ${payload.name} 失敗。`, "error");
        return;
      }

      setMessage(scheduleMessage, `已更新 ${payload.name} 的排班。`, "success");
      await loadSchedule();
    }

    async function deleteScheduleRow(rowEl) {
      const user = await checkSession(false);
      if (!user) {
        setMessage(scheduleMessage, "請先登入管理員帳號。", "error");
        return;
      }

      const id = Number(rowEl.dataset.id);
      const name = rowEl.querySelector(".row-name").value.trim() || "此筆資料";

      const ok = confirm(`確定要刪除 ${name} 的排班嗎？`);
      if (!ok) return;

      const { error } = await supabase
        .from("schedule_list")
        .delete()
        .eq("id", id);

      if (error) {
        console.error(error);
        setMessage(scheduleMessage, `刪除 ${name} 失敗。`, "error");
        return;
      }

      setMessage(scheduleMessage, `已刪除 ${name} 的排班。`, "success");
      await loadSchedule();
    }

    loginBtn.addEventListener("click", loginAdmin);
    logoutBtn.addEventListener("click", logoutAdmin);
    refreshSessionBtn.addEventListener("click", () => checkSession(true));
    addAmountBtn.addEventListener("click", addAmount);
    addScheduleBtn.addEventListener("click", addSchedule);
    reloadScheduleBtn.addEventListener("click", loadSchedule);

    scheduleList.addEventListener("click", async (e) => {
      const action = e.target?.dataset?.action;
      if (!action) return;

      const rowEl = e.target.closest(".schedule-row");
      if (!rowEl) return;

      if (action === "save") {
        await saveScheduleRow(rowEl);
      }

      if (action === "delete") {
        await deleteScheduleRow(rowEl);
      }
    });

    checkSession();
    loadSchedule();
  </script>
</body>
</html>
