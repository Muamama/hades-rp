<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard | 冥界</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="top-line"></div>

  <header class="site-header">
    <nav class="main-nav">
      <a href="index.html">主頁</a>
      <a href="rates.html">指名費用</a>
      <a href="timelist.html">時間表</a>
      <a href="services.html">服務內容</a>
      <a class="active" href="leaderboard.html">排行榜</a>
      <a href="host.html">店員</a>
      <a href="rules.html">規則條例</a>
    </nav>
  </header>

  <main class="page inner-page">
    <section class="page-title-block">
      <h1 class="page-title">店員排行榜</h1>
    </section>

    <section class="leaderboard-section">
      <div class="leaderboard-summary">
        <div class="leaderboard-stat">
          <span class="leaderboard-stat-label">上榜店員數</span>
          <strong id="hostCount">0</strong>
        </div>
        <div class="leaderboard-stat">
          <span class="leaderboard-stat-label">累積打賞總額</span>
          <strong id="totalAmount">0 GIL</strong>
        </div>
      </div>

      <div class="leaderboard-table">
        <div class="leaderboard-head">
          <span>排名</span>
          <span>店員</span>
          <span>打賞次數</span>
          <span>累積金額</span>
        </div>
        <div id="leaderboardBody"></div>
      </div>

      <div class="leaderboard-empty" id="leaderboardEmpty">
        目前尚無店員打賞資料。
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <a href="index.html">冥界</a>
    <a href="#">THREADS</a>
    <a href="#">DISCORD</a>
  </footer>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://jzhbqavasikwpxbqjksu.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_KFcwagT3Ho1ivjPv3Oq9zw_FNIaBVpX";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function renderLeaderboard() {
      const body = document.getElementById("leaderboardBody");
      const empty = document.getElementById("leaderboardEmpty");
      const totalAmountEl = document.getElementById("totalAmount");
      const hostCountEl = document.getElementById("hostCount");

      body.innerHTML = "";

      const { data, error } = await supabase
        .from("host_leaderboard")
        .select("host_name, tip_count, total_amount")
        .order("total_amount", { ascending: false })
        .order("tip_count", { ascending: false })
        .order("host_name", { ascending: true });

      if (error) {
        empty.style.display = "block";
        empty.textContent = "排行榜載入失敗。";
        console.error(error);
        return;
      }

      const activeRows = (data || []).filter(
        (row) => (row.tip_count || 0) > 0 || (row.total_amount || 0) > 0
      );

      const totalAmount = (data || []).reduce(
        (sum, row) => sum + (row.total_amount || 0),
        0
      );

      totalAmountEl.textContent = `${totalAmount.toLocaleString()} GIL`;
      hostCountEl.textContent = activeRows.length.toLocaleString();

      if (activeRows.length === 0) {
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";

      activeRows.forEach((row, index) => {
        const div = document.createElement("div");
        div.className = "leaderboard-item";
        div.innerHTML = `
          <span>#${index + 1}</span>
          <span>${row.host_name}</span>
          <span>${(row.tip_count || 0).toLocaleString()}</span>
          <span>${(row.total_amount || 0).toLocaleString()} GIL</span>
        `;
        body.appendChild(div);
      });
    }

    await renderLeaderboard();

    supabase
      .channel("leaderboard-realtime")
      .on(
        "postgres_changes",
        {
          event: "*",
          schema: "public",
          table: "host_leaderboard"
        },
        async () => {
          await renderLeaderboard();
        }
      )
      .subscribe();
  </script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const gilImg = '<img src="images/Gil_Icon.png" class="gil-icon" alt="GIL">';

  function replaceGil(node) {
    if (node.nodeType === 3) {
      // 文字節點
      if (node.nodeValue.includes("GIL")) {
        const span = document.createElement("span");
        span.innerHTML = node.nodeValue.replace(/GIL/g, gilImg);
        node.replaceWith(span);
      }
    } else {
      node.childNodes.forEach(replaceGil);
    }
  }

  replaceGil(document.body);
});
</script>
  
</body>
</html>
