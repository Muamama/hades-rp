<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>冥界</title>
  <link rel="icon" href="images/logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="images/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    .gil-price {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .gil-icon {
      width: 18px;
      height: 18px;
      object-fit: contain;
      flex-shrink: 0;
      filter: drop-shadow(0 0 4px rgba(212, 175, 55, 0.45));
      animation: gilFloat 2.2s ease-in-out infinite;
      transform-origin: center;
    }

    .gil-icon.large {
      width: 20px;
      height: 20px;
    }

    .leaderboard-stat strong.gil-price {
      justify-content: center;
    }

    .leaderboard-item .gil-price {
      justify-content: flex-start;
    }

    .leaderboard-item.is-updated .gil-price {
      animation: gilPulse 0.8s ease;
    }

    .leaderboard-item.is-updated .gil-icon {
      animation:
        gilFloat 2.2s ease-in-out infinite,
        gilFlash 0.8s ease;
    }

    @keyframes gilFloat {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-2px);
      }
    }

    @keyframes gilFlash {
      0% {
        filter: drop-shadow(0 0 0 rgba(212, 175, 55, 0));
      }
      50% {
        filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.9));
      }
      100% {
        filter: drop-shadow(0 0 4px rgba(212, 175, 55, 0.45));
      }
    }

    @keyframes gilPulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.03);
      }
      100% {
        transform: scale(1);
      }
    }
  </style>
</head>
<script>
  const siteHeader = document.querySelector('.site-header');

  window.addEventListener('scroll', () => {
    if (window.scrollY > 20) {
      siteHeader.classList.add('scrolled');
    } else {
      siteHeader.classList.remove('scrolled');
    }
  });
</script>
<script>
  const siteHeader = document.querySelector('.site-header');

  window.addEventListener('scroll', () => {
    if (window.scrollY > 20) {
      siteHeader.classList.add('scrolled');
    } else {
      siteHeader.classList.remove('scrolled');
    }
  });
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const menuToggle = document.getElementById('menuToggle');
  const mobileMenu = document.getElementById('mobileMenu');
  const siteHeader = document.querySelector('.site-header');

  if (menuToggle && mobileMenu) {
    menuToggle.addEventListener('click', function (e) {
      e.stopPropagation();
      menuToggle.classList.toggle('active');
      mobileMenu.classList.toggle('open');

      const isOpen = mobileMenu.classList.contains('open');
      menuToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });

    mobileMenu.addEventListener('click', function (e) {
      e.stopPropagation();
    });

    document.addEventListener('click', function () {
      menuToggle.classList.remove('active');
      mobileMenu.classList.remove('open');
      menuToggle.setAttribute('aria-expanded', 'false');
    });
  }

  if (siteHeader) {
    window.addEventListener('scroll', function () {
      if (window.scrollY > 10) {
        siteHeader.classList.add('scrolled');
      } else {
        siteHeader.classList.remove('scrolled');
      }
    });
  }
});
</script>
  
<body>
  <div class="top-line"></div>

  <header class="site-header">
    <div class="header-inner">
  
      <a href="index.html" class="logo">
        <img src="images/logo.png" alt="冥界 LOGO">
      </a>
  
      <div class="header-title">冥界</div>
  
      <button class="menu-toggle" id="menuToggle" aria-label="開啟選單" aria-expanded="false" aria-controls="mobileMenu">
        <span></span>
        <span></span>
        <span></span>
      </button>
  
      <nav class="main-nav">
        <a href="index.html">主頁</a>
        <a href="rates.html">指名費用</a>
        <a href="timelist.html">時間表</a>
        <a href="booking.html">墜入預約</a>
        <a href="services.html">服務內容</a>
        <a class="active" href="leaderboard.html">排行榜</a>
        <a href="host.html">店員</a>
        <a href="rules.html">規則條例</a>
        <a href="echo.html">冥界回聲</a>
      </nav>
    </div>
  
    <div class="mobile-menu" id="mobileMenu">
      <a href="index.html">主頁</a>
      <a href="rates.html">指名費用</a>
      <a href="timelist.html">時間表</a>
      <a href="booking.html">墜入預約</a>
      <a href="services.html">服務內容</a>
      <a class="active" href="leaderboard.html">排行榜</a>
      <a href="host.html">店員</a>
      <a href="rules.html">規則條例</a>
      <a href="echo.html">冥界回聲</a>
    </div>
  </header>
  <main>
    <section class="echo-hero">
      <div class="echo-hero-inner">
        <div class="echo-kicker">NETHER RANKING</div>
        <h1 class="echo-title">冥界排行榜</h1>
        <p class="echo-desc">
          所有被記錄下的名字，都是在這片夜色裡留下痕跡的人。這裡展示冥界目前的排行榜與累積紀錄，讓每一道回聲，都有被看見的位置。
        </p>
      </div>
    </section>

    <section class="leaderboard-section">
      <div class="leaderboard-summary">
        <div class="leaderboard-stat">
          <span class="leaderboard-stat-label">上榜店員數</span>
          <strong id="hostCount">0</strong>
        </div>
        <div class="leaderboard-stat">
          <span class="leaderboard-stat-label">累積打賞總額</span>
          <strong id="totalAmount">0</strong>
        </div>
      </div>

      <div class="leaderboard-table">
        <div class="leaderboard-head">
          <span>排名</span>
          <span>店員</span>
          <span>打賞次數</span>
          <span>累積金額</span>
        </div>
        <div id="leaderboardBody"></div>
      </div>

      <div class="leaderboard-empty" id="leaderboardEmpty">
        目前尚無店員打賞資料。
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <a href="index.html">冥界入口</a>
    <a href="timelist.html">預約時段</a>
    <a href="#">THREADS</a>
    <a href="#">DISCORD</a>
  </footer>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://jzhbqavasikwpxbqjksu.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_KFcwagT3Ho1ivjPv3Oq9zw_FNIaBVpX";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function gilHTML(amount, large = false) {
      return `
        <span class="gil-price">
          ${Number(amount || 0).toLocaleString()}
          <img src="images/Gil_Icon.png" class="gil-icon ${large ? "large" : ""}" alt="GIL">
        </span>
      `;
    }

    function markUpdatedRows() {
      const rows = document.querySelectorAll(".leaderboard-item");
      rows.forEach((row) => {
        row.classList.add("is-updated");
        setTimeout(() => {
          row.classList.remove("is-updated");
        }, 850);
      });

      const totalAmountEl = document.getElementById("totalAmount");
      totalAmountEl.classList.add("is-updated");
      setTimeout(() => {
        totalAmountEl.classList.remove("is-updated");
      }, 850);
    }

    async function renderLeaderboard(animate = false) {
      const body = document.getElementById("leaderboardBody");
      const empty = document.getElementById("leaderboardEmpty");
      const totalAmountEl = document.getElementById("totalAmount");
      const hostCountEl = document.getElementById("hostCount");

      body.innerHTML = "";

      const { data, error } = await supabase
        .from("host_leaderboard")
        .select("host_name, tip_count, total_amount")
        .order("total_amount", { ascending: false })
        .order("tip_count", { ascending: false })
        .order("host_name", { ascending: true });

      if (error) {
        empty.style.display = "block";
        empty.textContent = "排行榜載入失敗。";
        console.error(error);
        return;
      }

      const activeRows = (data || []).filter(
        (row) => (row.tip_count || 0) > 0 || (row.total_amount || 0) > 0
      );

      const totalAmount = (data || []).reduce(
        (sum, row) => sum + (row.total_amount || 0),
        0
      );

      totalAmountEl.innerHTML = gilHTML(totalAmount, true);
      hostCountEl.textContent = activeRows.length.toLocaleString();

      if (activeRows.length === 0) {
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";

      activeRows.forEach((row, index) => {
        const div = document.createElement("div");
        div.className = "leaderboard-item";
        div.innerHTML = `
          <span>#${index + 1}</span>
          <span>${row.host_name}</span>
          <span>${(row.tip_count || 0).toLocaleString()}</span>
          <span>${gilHTML(row.total_amount)}</span>
        `;
        body.appendChild(div);
      });

      if (animate) {
        markUpdatedRows();
      }
    }

    await renderLeaderboard();

    supabase
      .channel("leaderboard-realtime")
      .on(
        "postgres_changes",
        {
          event: "*",
          schema: "public",
          table: "host_leaderboard"
        },
        async () => {
          await renderLeaderboard(true);
        }
      )
      .subscribe();
  </script>
</body>
</html>
