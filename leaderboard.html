<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard | 冥界</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="top-line"></div>

  <header class="site-header">
    <nav class="main-nav">
      <a href="index.html">主頁</a>
      <a href="rates.html">指名費用</a>
      <a href="timelist.html">時間表</a>
      <a href="services.html">服務內容</a>
      <a class="active" href="leaderboard.html">排行榜</a>
      <a href="host.html">店員</a>
      <a href="rules.html">規則條例</a>
    </nav>
  </header>

  <main class="page inner-page">
    <section class="page-title-block">
      <h1 class="page-title">祭火排行榜</h1>
    </section>

    <section class="leaderboard-section">
      <div class="leaderboard-summary">
        <div class="leaderboard-stat">
          <span class="leaderboard-stat-label">總供奉次數</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="leaderboard-stat">
          <span class="leaderboard-stat-label">累積祭火</span>
          <strong id="totalAmount">0 GIL</strong>
        </div>
      </div>

      <div class="leaderboard-table">
        <div class="leaderboard-head">
          <span>排名</span>
          <span>階級</span>
          <span>次數</span>
          <span>累積金額</span>
        </div>

        <div id="leaderboardBody"></div>
      </div>

      <div class="leaderboard-empty" id="leaderboardEmpty">
        尚未有人供奉，冥界仍在等待第一道火。
      </div>

      <div class="leaderboard-actions">
        <button id="resetBoardBtn" class="leaderboard-reset-btn">清空排行榜</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <a href="index.html">冥界</a>
    <a href="#">THREADS</a>
    <a href="#">DISCORD</a>
  </footer>

  <script>
    const STORAGE_KEY = "meikai_leaderboard";

    function loadBoard() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        return {
          totalAmount: 0,
          totalCount: 0,
          tiers: {
            "餘燼供奉": { amount: 10000, count: 0, total: 0 },
            "狂火獻祭": { amount: 30000, count: 0, total: 0 },
            "深淵降臨": { amount: 50000, count: 0, total: 0 }
          }
        };
      }
      return JSON.parse(raw);
    }

    function renderBoard() {
      const board = loadBoard();
      const totalCountEl = document.getElementById("totalCount");
      const totalAmountEl = document.getElementById("totalAmount");
      const body = document.getElementById("leaderboardBody");
      const empty = document.getElementById("leaderboardEmpty");

      totalCountEl.textContent = board.totalCount.toLocaleString();
      totalAmountEl.textContent = `${board.totalAmount.toLocaleString()} GIL`;

      const rows = Object.entries(board.tiers)
        .map(([name, info]) => ({
          name,
          count: info.count,
          total: info.total,
          amount: info.amount
        }))
        .sort((a, b) => b.total - a.total || b.count - a.count || b.amount - a.amount);

      body.innerHTML = "";

      const hasData = rows.some(row => row.count > 0);

      if (!hasData) {
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";

      rows.forEach((row, index) => {
        const div = document.createElement("div");
        div.className = "leaderboard-item";
        div.innerHTML = `
          <span>#${index + 1}</span>
          <span>${row.name}</span>
          <span>${row.count}</span>
          <span>${row.total.toLocaleString()} GIL</span>
        `;
        body.appendChild(div);
      });
    }

    document.getElementById("resetBoardBtn").addEventListener("click", () => {
      localStorage.removeItem(STORAGE_KEY);
      renderBoard();
    });

    renderBoard();
  </script>
</body>
</html>
