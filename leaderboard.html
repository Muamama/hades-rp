<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard | 冥界</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="top-line"></div>

  <header class="site-header">
    <nav class="main-nav">
      <a href="index.html">主頁</a>
      <a href="rates.html">指名費用</a>
      <a href="timelist.html">時間表</a>
      <a href="services.html">服務內容</a>
      <a class="active" href="leaderboard.html">排行榜</a>
      <a href="host.html">店員</a>
      <a href="rules.html">規則條例</a>
    </nav>
  </header>

  <main class="page inner-page">
    <section class="page-title-block">
      <h1 class="page-title">店員排行榜</h1>
    </section>

    <section class="leaderboard-section">
      <div class="leaderboard-summary">
        <div class="leaderboard-stat">
          <span class="leaderboard-stat-label">上榜店員數</span>
          <strong id="hostCount">0</strong>
        </div>
        <div class="leaderboard-stat">
          <span class="leaderboard-stat-label">累積打賞總額</span>
          <strong id="totalAmount">0 GIL</strong>
        </div>
      </div>

      <div class="leaderboard-table">
        <div class="leaderboard-head">
          <span>排名</span>
          <span>店員</span>
          <span>打賞次數</span>
          <span>累積金額</span>
        </div>
        <div id="leaderboardBody"></div>
      </div>

      <div class="leaderboard-empty" id="leaderboardEmpty">
        目前尚無店員打賞資料。
      </div>

      <div class="leaderboard-actions">
        <button id="resetBoardBtn" class="leaderboard-reset-btn" type="button">清空排行榜</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <a href="index.html">冥界</a>
    <a href="#">THREADS</a>
    <a href="#">DISCORD</a>
  </footer>

  <script>
    const STORAGE_KEY = "meikai_host_leaderboard";

    const hostList = [
      "刻耳柏洛斯",
      "龍冽",
      "安怛",
      "Jazper",
      "格斯亞德",
      "蛇魂",
      "餘燼",
      "格拉斯莫",
      "法拉歐",
      "牛奶",
      "無盡寒夜",
      "埃伊諾（Åyno）"
    ];

    function createDefaultBoard() {
      const hosts = {};
      hostList.forEach((name) => {
        hosts[name] = {
          count: 0,
          total: 0
        };
      });

      return {
        hosts
      };
    }

    function loadBoard() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        return createDefaultBoard();
      }

      const parsed = JSON.parse(raw);

      if (!parsed.hosts) {
        return createDefaultBoard();
      }

      hostList.forEach((name) => {
        if (!parsed.hosts[name]) {
          parsed.hosts[name] = { count: 0, total: 0 };
        }
      });

      return parsed;
    }

    function renderBoard() {
      const board = loadBoard();
      const body = document.getElementById("leaderboardBody");
      const empty = document.getElementById("leaderboardEmpty");
      const totalAmountEl = document.getElementById("totalAmount");
      const hostCountEl = document.getElementById("hostCount");

      const rows = Object.entries(board.hosts)
        .map(([name, info]) => ({
          name,
          count: info.count || 0,
          total: info.total || 0
        }))
        .sort((a, b) => b.total - a.total || b.count - a.count || a.name.localeCompare(b.name, "zh-Hant"));

      const activeRows = rows.filter((row) => row.count > 0 || row.total > 0);
      const totalAmount = rows.reduce((sum, row) => sum + row.total, 0);

      totalAmountEl.textContent = `${totalAmount.toLocaleString()} GIL`;
      hostCountEl.textContent = activeRows.length.toLocaleString();

      body.innerHTML = "";

      if (activeRows.length === 0) {
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";

      activeRows.forEach((row, index) => {
        const div = document.createElement("div");
        div.className = "leaderboard-item";
        div.innerHTML = `
          <span>#${index + 1}</span>
          <span>${row.name}</span>
          <span>${row.count}</span>
          <span>${row.total.toLocaleString()} GIL</span>
        `;
        body.appendChild(div);
      });
    }

    document.getElementById("resetBoardBtn").addEventListener("click", () => {
      localStorage.removeItem(STORAGE_KEY);
      renderBoard();
    });

    renderBoard();
  </script>
</body>
</html>
