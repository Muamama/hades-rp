<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rates | 冥界</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="top-line"></div>

  <header class="site-header">
    <nav class="main-nav">
      <a href="index.html">主頁</a>
      <a class="active" href="rates.html">指名費用</a>
      <a href="timelist.html">時間表</a>
      <a href="services.html">服務內容</a>
      <a href="leaderboard.html">排行榜</a>
      <a href="host.html">店員</a>
      <a href="rules.html">規則條例</a>
    </nav>
  </header>

  <main class="page inner-page rates-page">

    <section class="page-title-block">
      <h1 class="page-title">店員指名</h1>
    </section>

    <section class="rates-section">

      <div class="rates-row">
        <div class="rates-label">
          <h2>普通指名</h2>
        </div>
        <div class="rates-table">
          <div class="rates-head">
            <span>時間</span>
            <span>價格</span>
          </div>
          <div class="rates-item">
            <span>30 MIN</span>
            <span>100,000 GIL</span>
          </div>
        </div>
      </div>

      <div class="rates-row">
        <div class="rates-label">
          <h2>包廂指名</h2>
        </div>
        <div class="rates-table">
          <div class="rates-head">
            <span>時間</span>
            <span>價格</span>
          </div>
          <div class="rates-item">
            <span>30 MIN</span>
            <span>150,000 GIL</span>
          </div>
        </div>
      </div>

      <div class="rates-row">
        <div class="rates-label">
          <h2>冥界供奉</h2>
        </div>

        <div class="rates-table reward-table">
          <div class="rates-head">
            <span>階級</span>
            <span>金額</span>
          </div>

          <button
            class="rates-item reward-btn"
            data-tier="餘燼供奉"
            data-amount="10000"
            data-desc="微弱卻溫熱的火，像在黑夜裡遞上一點尚未熄滅的餘燼。適合輕聲表達偏愛與注視。"
            type="button"
          >
            <span>餘燼供奉</span>
             <span class="gil-price">10,000<img src="images/Gil_Icon.png" class="gil-icon" alt="GIL"></span>
          </button>

          <button
            class="rates-item reward-btn"
            data-tier="狂火獻祭"
            data-amount="30000"
            data-desc="火勢蔓延，慾望不再遮掩。這不是路過的投餵，而是明目張膽地將視線與情緒推向對方。"
            type="button"
          >
            <span>狂火獻祭</span>
             <span class="gil-price">30,000<img src="images/Gil_Icon.png" class="gil-icon" alt="GIL"></span>
          </button>

          <button
            class="rates-item reward-btn"
            data-tier="深淵降臨"
            data-amount="50000"
            data-desc="最沉重也最失控的一次墜落。不是單純的欣賞，而是讓整場夜晚都記住你的存在。"
            type="button"
          >
            <span>深淵降臨</span>
             <span class="gil-price">50,000<img src="images/Gil_Icon.png" class="gil-icon" alt="GIL"></span>
          </button>
        </div>
      </div>

    </section>

    <section class="reward-note-section">
      <p class="reward-note" id="rewardMessage">點擊供奉階級，可查看對應的供奉介紹。</p>
    </section>

  </main>

  <div class="host-popup-overlay" id="rewardPopupOverlay">
    <div class="host-popup-card reward-popup-card">
      <button class="host-popup-close" id="rewardPopupClose" type="button">✕</button>

      <div class="host-popup-info reward-popup-info">
        <h3 id="rewardPopupName">冥界供奉</h3>
        <p id="rewardPopupAmount"></p>
        <p id="rewardPopupText"></p>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <a href="index.html">冥界</a>
    <a href="#">THREADS</a>
    <a href="#">DISCORD</a>
  </footer>

  <script>
    const rewardButtons = document.querySelectorAll(".reward-btn");
    const rewardMessage = document.getElementById("rewardMessage");
    const rewardPopupOverlay = document.getElementById("rewardPopupOverlay");
    const rewardPopupClose = document.getElementById("rewardPopupClose");
    const rewardPopupName = document.getElementById("rewardPopupName");
    const rewardPopupAmount = document.getElementById("rewardPopupAmount");
    const rewardPopupText = document.getElementById("rewardPopupText");

    function openRewardPopup(tier, amount, desc, btn) {
      rewardPopupName.textContent = tier;
      rewardPopupAmount.textContent = `${Number(amount).toLocaleString()} GIL`;
      rewardPopupText.textContent = desc;

      rewardPopupOverlay.classList.add("show");
      document.body.classList.add("popup-open");

      rewardMessage.textContent = `你查看了「${tier}」的供奉介紹。`;
      rewardMessage.classList.add("show");

      btn.classList.add("reward-flash");
      setTimeout(() => {
        btn.classList.remove("reward-flash");
      }, 450);
    }

    function closeRewardPopup() {
      rewardPopupOverlay.classList.remove("show");
      document.body.classList.remove("popup-open");
    }

    rewardButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        openRewardPopup(
          btn.dataset.tier,
          btn.dataset.amount,
          btn.dataset.desc,
          btn
        );
      });
    });

    rewardPopupClose.addEventListener("click", closeRewardPopup);

    rewardPopupOverlay.addEventListener("click", (e) => {
      if (e.target === rewardPopupOverlay) {
        closeRewardPopup();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeRewardPopup();
      }
    });
  </script>
</body>
</html>
