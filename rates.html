<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rates | 冥界</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="top-line"></div>

  <header class="site-header">
    <nav class="main-nav">
      <a href="index.html">主頁</a>
      <a class="active" href="rates.html">指名費用</a>
      <a href="timelist.html">時間表</a>
      <a href="services.html">服務內容</a>
      <a href="leaderboard.html">排行榜</a>
      <a href="host.html">店員</a>
      <a href="rules.html">規則條例</a>
    </nav>
  </header>

  <main class="page inner-page rates-page">

    <section class="page-title-block">
      <h1 class="page-title">店員指名</h1>
    </section>

    <section class="rates-section">

      <div class="rates-row">
        <div class="rates-label">
          <h2>普通指名</h2>
        </div>
        <div class="rates-table">
          <div class="rates-head">
            <span>時間</span>
            <span>價格</span>
          </div>
          <div class="rates-item">
            <span>30 MIN</span>
            <span>100,000 GIL</span>
          </div>
        </div>
      </div>

      <div class="rates-row">
        <div class="rates-label">
          <h2>包廂指名</h2>
        </div>
        <div class="rates-table">
          <div class="rates-head">
            <span>時間</span>
            <span>價格</span>
          </div>
          <div class="rates-item">
            <span>30 MIN</span>
            <span>150,000 GIL</span>
          </div>
        </div>
      </div>

      <div class="rates-row">
        <div class="rates-label">
          <h2>冥界供奉</h2>
        </div>

        <div class="rates-table reward-table">
          <div class="rates-head">
            <span>階級</span>
            <span>金額</span>
          </div>

          <button class="rates-item reward-btn" data-tier="餘燼供奉" data-amount="10000">
            <span>餘燼供奉</span>
            <span>10,000 GIL</span>
          </button>

          <button class="rates-item reward-btn" data-tier="狂火獻祭" data-amount="30000">
            <span>狂火獻祭</span>
            <span>30,000 GIL</span>
          </button>

          <button class="rates-item reward-btn" data-tier="深淵降臨" data-amount="50000">
            <span>深淵降臨</span>
            <span>50,000 GIL</span>
          </button>
        </div>
      </div>

    </section>

    <section class="reward-note-section">
      <p class="reward-note" id="rewardMessage">點擊供奉階級，即可為冥界累積祭火。</p>
    </section>

  </main>

  <footer class="site-footer">
    <a href="index.html">冥界</a>
    <a href="#">THREADS</a>
    <a href="#">DISCORD</a>
  </footer>

  <script>
    const rewardButtons = document.querySelectorAll(".reward-btn");
    const rewardMessage = document.getElementById("rewardMessage");
    const STORAGE_KEY = "meikai_leaderboard";

    function loadBoard() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        return {
          totalAmount: 0,
          totalCount: 0,
          tiers: {
            "餘燼供奉": { amount: 10000, count: 0, total: 0 },
            "狂火獻祭": { amount: 30000, count: 0, total: 0 },
            "深淵降臨": { amount: 50000, count: 0, total: 0 }
          }
        };
      }
      return JSON.parse(raw);
    }

    function saveBoard(board) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(board));
    }

    rewardButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        const tier = btn.dataset.tier;
        const amount = Number(btn.dataset.amount);

        const board = loadBoard();

        if (!board.tiers[tier]) {
          board.tiers[tier] = { amount, count: 0, total: 0 };
        }

        board.tiers[tier].count += 1;
        board.tiers[tier].total += amount;
        board.totalAmount += amount;
        board.totalCount += 1;

        saveBoard(board);

        rewardMessage.textContent = `你已獻上「${tier}」 ${amount.toLocaleString()} GIL。冥界累積祭火：${board.totalAmount.toLocaleString()} GIL`;
        rewardMessage.classList.add("show");

        btn.classList.add("reward-flash");
        setTimeout(() => {
          btn.classList.remove("reward-flash");
        }, 450);
      });
    });
  </script>
</body>
</html>
