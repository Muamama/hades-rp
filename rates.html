<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rates | 冥界</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="top-line"></div>

  <header class="site-header">
    <nav class="main-nav">
      <a href="index.html">主頁</a>
      <a class="active" href="rates.html">指名費用</a>
      <a href="services.html">服務內容</a>
      <a href="host.html">店員</a>
      <a href="rules.html">規則條例</a>
    </nav>
  </header>

  <main class="page inner-page rates-page">
    <section class="page-title-block">
      <h1 class="page-title">店員指名</h1>
    </section>

    <section class="rates-section">
      <div class="rates-row">
        <div class="rates-label">
          <h2>普通指名</h2>
        </div>
        <div class="rates-table">
          <div class="rates-head">
            <span>時間</span>
            <span>價格</span>
          </div>
          <div class="rates-item"><span>30 MIN</span><span>100,000 GIL</span></div>
        </div>
      </div>

      <div class="rates-row">
        <div class="rates-label">
          <h2>包廂指名</h2>
        </div>
        <div class="rates-table">
          <div class="rates-head">
            <span>時間</span>
            <span>價格</span>
          </div>
          <div class="rates-item"><span>30 MIN</span><span>150,000 GIL</span></div>
        </div>
      </div>
    </section>
    </section> <!-- rates-section結束 -->

    <section class="schedule-section">
      <h2 class="schedule-title">店員排班</h2>

      <div class="schedule-table" id="scheduleTable">

        <div class="schedule-head">
          <span>店員</span>
          <span>日期</span>
          <span>狀態</span>
        </div>

        <!-- JS會自動填 -->
        
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <a href="index.html">冥界</a>
    <a href="#">THREADS</a>
    <a href="#">DISCORD</a>
  </footer>
  <script>
  const data = [
    { name: "刻耳柏洛斯", date: "2026-03-23", status: "wait" },
    { name: "厄耳特洛斯", date: "2026-03-23", status: "busy" },
    { name: "龍冽", date: "2026-03-24", status: "off" },
    { name: "Jazper", date: "2026-03-23", status: "wait" },
    { name: "格斯亞德", date: "2026-03-25", status: "busy" },
  ];

  const table = document.getElementById("scheduleTable");
  const today = new Date().toISOString().slice(0,10);

  data.forEach(item => {
    const div = document.createElement("div");
    div.classList.add("schedule-item");

    if(item.date === today){
      div.classList.add("today");
    }

    let statusText = "";
    let statusClass = "";

    if(item.status === "wait"){
      statusText = "空閒";
      statusClass = "status-wait";
    }
    if(item.status === "busy"){
      statusText = "已預定";
      statusClass = "status-busy";
    }
    if(item.status === "off"){
      statusText = "請假";
      statusClass = "status-off";
    }

    div.innerHTML = `
      <span>${item.name}</span>
      <span>${item.date}</span>
      <span class="${statusClass}">${statusText}</span>
    `;

    table.appendChild(div);
  });
  </script>
</body>
</html>
