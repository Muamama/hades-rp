<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>時間表 | 冥界</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://jzhbqavasikwpxbqjksu.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_KFcwagT3Ho1ivjPv3Oq9zw_FNIaBVpX";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let scheduleChannel = null;

    window.addEventListener("DOMContentLoaded", () => {
      const siteHeader = document.querySelector(".site-header");
      const table = document.getElementById("scheduleTable");
      const overlay = document.getElementById("hostPopupOverlay");
      const popupImage = document.getElementById("hostPopupImage");
      const popupName = document.getElementById("hostPopupName");
      const popupText = document.getElementById("hostPopupText");
      const popupClose = document.getElementById("hostPopupClose");

      window.addEventListener("scroll", () => {
        if (window.scrollY > 20) {
          siteHeader.classList.add("scrolled");
        } else {
          siteHeader.classList.remove("scrolled");
        }
      });

      function getStatus(status) {
        if (status === "wait") return ["空閒", "status-wait", "今夜有空，等待你的指名。"];
        if (status === "busy") return ["已預定", "status-busy", "已被預約，暫不可用。"];
        return ["請假", "status-off", "今夜不在場。"];
      }

      function clearScheduleRows() {
        table.querySelectorAll(".schedule-item, .schedule-empty, .schedule-loading, .schedule-error").forEach(el => el.remove());
      }

      function openPopup(item, el) {
        document.querySelectorAll(".schedule-item").forEach(e => e.classList.remove("active"));
        if (el) el.classList.add("active");

        popupImage.src = item.img || "";
        popupImage.alt = item.name || "";
        popupName.textContent = item.name || "";
        popupText.textContent = getStatus(item.status)[2];

        overlay.classList.add("show");
        document.body.classList.add("popup-open");
      }

      function closePopup() {
        overlay.classList.remove("show");
        document.body.classList.remove("popup-open");
        document.querySelectorAll(".schedule-item").forEach(e => e.classList.remove("active"));
      }

      function renderLoading() {
        clearScheduleRows();

        const loading = document.createElement("div");
        loading.className = "schedule-loading";
        loading.innerHTML = `
          <span class="schedule-name">讀取中</span>
          <span>...</span>
          <span class="status-wait">請稍候</span>
        `;
        table.appendChild(loading);
      }

      function renderError(message = "請稍後再試") {
        clearScheduleRows();

        const fail = document.createElement("div");
        fail.className = "schedule-error";
        fail.innerHTML = `
          <span class="schedule-name">讀取失敗</span>
          <span>--</span>
          <span class="status-off">${message}</span>
        `;
        table.appendChild(fail);
      }

      function renderEmpty() {
        clearScheduleRows();

        const empty = document.createElement("div");
        empty.className = "schedule-empty";
        empty.innerHTML = `
          <span class="schedule-name">目前無排班資料</span>
          <span>--</span>
          <span class="status-off">未開放</span>
        `;
        table.appendChild(empty);
      }

      function renderSchedule(data) {
        clearScheduleRows();

        if (!data || data.length === 0) {
          renderEmpty();
          return;
        }

        data.forEach(item => {
          const div = document.createElement("div");
          div.classList.add("schedule-item");

          const status = getStatus(item.status);

          div.innerHTML = `
            <span class="schedule-name">${item.name || ""}</span>
            <span>${item.date || ""}</span>
            <span class="${status[1]}">${status[0]}</span>
          `;

          div.onclick = () => openPopup(item, div);

          table.appendChild(div);
        });
      }

      async function loadSchedule() {
        renderLoading();

        const { data, error } = await supabase
          .from("schedule_list")
          .select("*")
          .order("sort_order", { ascending: true })
          .order("id", { ascending: true });

        if (error) {
          console.error("讀取時間表失敗：", error);
          renderError("請稍後再試");
          return;
        }

        renderSchedule(data || []);
      }

      function setupRealtime() {
        if (scheduleChannel) {
          supabase.removeChannel(scheduleChannel);
        }

        scheduleChannel = supabase
          .channel("schedule_list_realtime")
          .on(
            "postgres_changes",
            {
              event: "*",
              schema: "public",
              table: "schedule_list"
            },
            async () => {
              await loadSchedule();
            }
          )
          .subscribe((status) => {
            console.log("schedule_list realtime status:", status);
          });
      }

      popupClose.onclick = closePopup;

      overlay.onclick = (e) => {
        if (e.target === overlay) {
          closePopup();
        }
      };

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closePopup();
        }
      });

      loadSchedule();
      setupRealtime();

      window.addEventListener("beforeunload", () => {
        if (scheduleChannel) {
          supabase.removeChannel(scheduleChannel);
        }
      });
    });
  </script>
</head>

<script>
  const siteHeader = document.querySelector('.site-header');

  window.addEventListener('scroll', () => {
    if (window.scrollY > 20) {
      siteHeader.classList.add('scrolled');
    } else {
      siteHeader.classList.remove('scrolled');
    }
  });
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const menuToggle = document.getElementById('menuToggle');
  const mobileMenu = document.getElementById('mobileMenu');
  const siteHeader = document.querySelector('.site-header');

  if (menuToggle && mobileMenu) {
    menuToggle.addEventListener('click', function (e) {
      e.stopPropagation();
      menuToggle.classList.toggle('active');
      mobileMenu.classList.toggle('open');

      const isOpen = mobileMenu.classList.contains('open');
      menuToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });

    mobileMenu.addEventListener('click', function (e) {
      e.stopPropagation();
    });

    document.addEventListener('click', function () {
      menuToggle.classList.remove('active');
      mobileMenu.classList.remove('open');
      menuToggle.setAttribute('aria-expanded', 'false');
    });
  }

  if (siteHeader) {
    window.addEventListener('scroll', function () {
      if (window.scrollY > 10) {
        siteHeader.classList.add('scrolled');
      } else {
        siteHeader.classList.remove('scrolled');
      }
    });
  }
});
</script>

        <img src="images/logo.png" alt="冥界 LOGO">
      </a>
  
      <div class="header-title">冥界</div>
  
      <button class="menu-toggle" id="menuToggle" aria-label="開啟選單" aria-expanded="false" aria-controls="mobileMenu">
        <span></span>
        <span></span>
        <span></span>
      </button>
  
      <nav class="main-nav">
        <a href="index.html">主頁</a>
        <a href="rates.html">指名費用</a>
        <a class="active" href="timelist.html">時間表</a>
        <a href="services.html">服務內容</a>
        <a href="leaderboard.html">排行榜</a>
        <a href="host.html">店員</a>
        <a href="rules.html">規則條例</a>
      </nav>
    </div>
  
    <div class="mobile-menu" id="mobileMenu">
      <a href="index.html">主頁</a>
      <a href="rates.html">指名費用</a>
      <a class="active" href="timelist.html">時間表</a>
      <a href="services.html">服務內容</a>
      <a href="leaderboard.html">排行榜</a>
      <a href="host.html">店員</a>
      <a href="rules.html">規則條例</a>
    </div>
  </header>

  <main class="page inner-page">

    <section class="page-title-block">
      <h1 class="page-title">今夜名冊</h1>
    </section>

    <!-- 排班 -->
    <section class="schedule-section">
      <h2 class="schedule-title">時間表</h2>

      <div class="schedule-table" id="scheduleTable">
        <div class="schedule-head">
          <span>店員</span>
          <span>日期</span>
          <span>狀態</span>
        </div>
      </div>
    </section>

  </main>

  <!-- POP -->
  <div class="host-popup-overlay" id="hostPopupOverlay">
    <div class="host-popup-card">
      <button class="host-popup-close" id="hostPopupClose">✕</button>

      <div class="host-popup-image-wrap">
        <img id="hostPopupImage" src="" alt="">
      </div>

      <div class="host-popup-info">
        <h3 id="hostPopupName"></h3>
        <p id="hostPopupText"></p>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <a href="index.html">冥界入口</a>
    <a href="#">THREADS</a>
    <a href="#">DISCORD</a>
  </footer>

</body>
</html>
