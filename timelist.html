<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>時間表 | 冥界</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <div class="top-line"></div>

  <header class="site-header">
    <nav class="main-nav">
      <a href="index.html">主頁</a>
      <a href="rates.html">指名費用</a>
      <a class="active" href="timelist.html">時間表</a>
      <a href="services.html">服務內容</a>
      <a href="leaderboard.html">排行榜</a>
      <a href="host.html">店員</a>
      <a href="rules.html">規則條例</a>
    </nav>
  </header>

  <main class="page inner-page">

    <section class="page-title-block">
      <h1 class="page-title">今夜名冊</h1>
    </section>

    <!-- 排班 -->
    <section class="schedule-section">
      <h2 class="schedule-title">時間表</h2>

      <div class="schedule-table" id="scheduleTable">
        <div class="schedule-head">
          <span>店員</span>
          <span>日期</span>
          <span>狀態</span>
        </div>
      </div>
    </section>

  </main>

  <!-- POP -->
  <div class="host-popup-overlay" id="hostPopupOverlay">
    <div class="host-popup-card">
      <button class="host-popup-close" id="hostPopupClose">✕</button>

      <div class="host-popup-image-wrap">
        <img id="hostPopupImage" src="" alt="">
      </div>

      <div class="host-popup-info">
        <h3 id="hostPopupName"></h3>
        <p id="hostPopupText"></p>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <a href="index.html">冥界</a>
    <a href="#">THREADS</a>
    <a href="#">DISCORD</a>
  </footer>

  <script>
    /* =========================
       Supabase 設定
       請改成你自己的
    ========================= */
    const SUPABASE_URL = "https://jzhbqavasikwpxbqjksu.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_KFcwagT3Ho1ivjPv3Oq9zw_FNIaBVpX";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* =========================
       Header Scroll
    ========================= */
    const siteHeader = document.querySelector('.site-header');

    window.addEventListener('scroll', () => {
      if (window.scrollY > 20) {
        siteHeader.classList.add('scrolled');
      } else {
        siteHeader.classList.remove('scrolled');
      }
    });

    /* =========================
       DOM
    ========================= */
    const table = document.getElementById("scheduleTable");
    const overlay = document.getElementById("hostPopupOverlay");
    const popupImage = document.getElementById("hostPopupImage");
    const popupName = document.getElementById("hostPopupName");
    const popupText = document.getElementById("hostPopupText");
    const popupClose = document.getElementById("hostPopupClose");

    /* =========================
       狀態對應
    ========================= */
    function getStatus(status) {
      if (status === "wait") return ["空閒", "status-wait", "今夜有空，等待你的指名。"];
      if (status === "busy") return ["已預定", "status-busy", "已被預約，暫不可用。"];
      return ["請假", "status-off", "今夜不在場。"];
    }

    /* =========================
       Popup
    ========================= */
    function openPopup(item, el) {
      document.querySelectorAll(".schedule-item").forEach(e => e.classList.remove("active"));
      el.classList.add("active");

      popupImage.src = item.img || "";
      popupImage.alt = item.name || "";
      popupName.textContent = item.name || "";
      popupText.textContent = getStatus(item.status)[2];

      overlay.classList.add("show");
      document.body.classList.add("popup-open");
    }

    function closePopup() {
      overlay.classList.remove("show");
      document.body.classList.remove("popup-open");
      document.querySelectorAll(".schedule-item").forEach(e => e.classList.remove("active"));
    }

    /* =========================
       清空舊資料列
    ========================= */
    function clearScheduleItems() {
      document.querySelectorAll(".schedule-item").forEach(item => item.remove());
    }

    /* =========================
       渲染排班
    ========================= */
    function renderSchedule(data) {
      clearScheduleItems();

      if (!data || data.length === 0) {
        const empty = document.createElement("div");
        empty.className = "schedule-item";
        empty.innerHTML = `
          <span class="schedule-name">目前無排班資料</span>
          <span>--</span>
          <span class="status-off">未開放</span>
        `;
        table.appendChild(empty);
        return;
      }

      data.forEach(item => {
        const div = document.createElement("div");
        div.classList.add("schedule-item");

        const status = getStatus(item.status);

        div.innerHTML = `
          <span class="schedule-name">${item.name || ""}</span>
          <span>${item.date || ""}</span>
          <span class="${status[1]}">${status[0]}</span>
        `;

        div.onclick = () => openPopup(item, div);

        table.appendChild(div);
      });
    }

    /* =========================
       讀取 Supabase
    ========================= */
    async function loadSchedule() {
      const { data, error } = await supabaseClient
        .from("schedule_list")
        .select("*")
        .order("sort_order", { ascending: true })
        .order("id", { ascending: true });

      if (error) {
        console.error("讀取時間表失敗：", error);

        clearScheduleItems();

        const fail = document.createElement("div");
        fail.className = "schedule-item";
        fail.innerHTML = `
          <span class="schedule-name">讀取失敗</span>
          <span>--</span>
          <span class="status-off">請稍後再試</span>
        `;
        table.appendChild(fail);
        return;
      }

      renderSchedule(data || []);
    }

    /* =========================
       事件
    ========================= */
    popupClose.onclick = closePopup;

    overlay.onclick = (e) => {
      if (e.target === overlay) {
        closePopup();
      }
    };

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closePopup();
      }
    });

    /* =========================
       初始化
    ========================= */
    loadSchedule();
  </script>

</body>
</html>
